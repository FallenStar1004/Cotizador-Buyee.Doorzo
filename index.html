<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Buyee/Doorzo</title>
    <style>
        :root {
            --bg-dark: #0b132b;
            --bg-card: rgba(28, 37, 65, 0.65);
            --accent-blue: #48cae4;
            --text-light: #f8f9fa;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0b132b, #1c2541);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: var(--text-light);
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            color: var(--accent-blue);
            text-shadow: 0 2px 10px rgba(72, 202, 228, 0.3);
        }
        h2 {
            font-size: 1.1rem;
            font-weight: normal;
            margin: 0 0 1rem 0;
            color: #a5a5a5;
        }
        .banner-penguin {
            width: 160px;
            height: auto;
            margin: 0.5rem auto 1.5rem auto;
            display: block;
            border-radius: 12px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: #e0e1dd;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(11, 19, 43, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            color: white;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-blue); }
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--accent-blue);
            color: #0b132b;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        button:hover {
            background-color: #90e0ef;
            box-shadow: 0 0 15px rgba(72, 202, 228, 0.5);
        }
        button:active { transform: scale(0.98); }
        .btn-reset {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            width: auto;
            margin-top: 1.5rem;
            display: inline-block;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-reset:hover { background-color: rgba(255, 255, 255, 0.25); }
        .result-box {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: rgba(11, 19, 43, 0.5);
            border-radius: 12px;
            border: 1px solid var(--accent-blue);
            display: none;
        }
        .result-box.active { display: block; }
        .price-label { font-size: 0.9rem; color: #a5a5a5; margin-bottom: 0.3rem; }
        .price { font-size: 1.8rem; font-weight: bold; color: var(--accent-blue); }
        .snowflake {
            position: absolute;
            top: -10px;
            color: #ffffff;
            user-select: none;
            z-index: 1;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        .snow-floor {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 110%;
            height: 40px;
            background: radial-gradient(circle at top, #ffffff 60%, #e0f2fe 100%);
            border-radius: 50% 40% 0 0 / 20px 15px 0 0;
            box-shadow: 0 -8px 25px rgba(255, 255, 255, 0.4), inset 0 4px 10px rgba(255, 255, 255, 0.8);
            z-index: 2;
            transform: translateX(-5%);
            animation: snowAccumulate 12s ease-in-out infinite alternate;
        }
        .snow-floor-back {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 120%;
            height: 50px;
            background: radial-gradient(circle at top, #f1f5f9 40%, #cbd5e1 100%);
            border-radius: 40% 60% 0 0 / 25px 20px 0 0;
            opacity: 0.6;
            z-index: 1;
            transform: translateX(-10%);
            animation: snowAccumulateBack 16s ease-in-out infinite alternate;
        }
        @keyframes snowAccumulate {
            0% { height: 35px; transform: translateX(-5%) rotate(0deg); }
            100% { height: 55px; transform: translateX(-2%) rotate(0.5deg); }
        }
        @keyframes snowAccumulateBack {
            0% { height: 45px; transform: translateX(-10%) rotate(0deg); }
            100% { height: 65px; transform: translateX(-5%) rotate(-0.5deg); }
        }
        .action-penguin {
            position: fixed;
            bottom: 35px;
            left: calc(50% - 65px);
            font-size: 3rem;
            z-index: 5;
            user-select: none;
            pointer-events: none;
            animation: penguinJump 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
            transition: bottom 0.5s ease-in-out;
            letter-spacing: -10px;
        }
        @keyframes penguinJump {
            0%, 100% { transform: translateY(0) scaleY(1); }
            40% { transform: translateY(0) scaleY(0.9); }
            50% { transform: translateY(-90px) scaleY(1.05); } 
            60% { transform: translateY(0) scaleY(0.95); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cotizador Buyee/Doorzo</h1>
        <h2>❄️fallen star❄️☃️</h2>
        
        <!-- Foto incrustada directamente en código seguro -->
        <img class="banner-penguin" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 500 400' width='100%' height='100%' style='background-color:%23fff; border-radius:12px;'><g transform='translate(40,40)'><g class='penguin' transform='translate(40,100)'><ellipse cx='110' cy='130' rx='75' ry='105' fill='%23e2e8f0'/><ellipse cx='105' cy='115' rx='50' ry='70' fill='%23fff'/><path d='M70,95 Q55,60 100,50 Q145,60 130,95 Q145,130 100,135 Q55,130 70,95 Z' fill='%23334155'/><ellipse cx='88' cy='85' rx='18' ry='22' fill='%23fff'/><ellipse cx='122' cy='85' rx='18' ry='22' fill='%23fff'/><circle cx='92' cy='88' r='5' fill='%23000'/><circle cx='118' cy='88' r='5' fill='%23000'/><ellipse cx='105' cy='102' rx='12' ry='7' fill='%23fca5a5' opacity='0.5'/><path d='M75,120 Q50,140 30,170 Q45,210 70,170 Z' fill='%23e2e8f0'/><path d='M135,120 Q160,110 185,80 Q195,110 145,160 Z' fill='%23e2e8f0'/><ellipse cx='65' cy='235' rx='18' ry='10' fill='%23334155'/><ellipse cx='135' cy='235' rx='18' ry='10' fill='%23334155'/></g><g class='penguin' transform='translate(155,100)'><ellipse cx='110' cy='130' rx='75' ry='105' fill='%23e2e8f0'/><ellipse cx='105' cy='115' rx='50' ry='70' fill='%23fff'/><path d='M70,95 Q55,60 100,50 Q145,60 130,95 Q145,130 100,135 Q55,130 70,95 Z' fill='%23334155'/><ellipse cx='88' cy='85' rx='18' ry='22' fill='%23fff'/><ellipse cx='122' cy='85' rx='18' ry='22' fill='%23fff'/><circle cx='92' cy='88' r='5' fill='%23000'/><circle cx='118' cy='88' r='5' fill='%23000'/><ellipse cx='105' cy='102' rx='12' ry='7' fill='%23fef08a' opacity='0.5'/><path d='M75,120 Q50,140 30,170 Q45,210 70,170 Z' fill='%23e2e8f0'/><path d='M135,120 Q160,110 185,80 Q195,110 145,160 Z' fill='%23e2e8f0'/><ellipse cx='65' cy='235' rx='18' ry='10' fill='%23334155'/><ellipse cx='135' cy='235' rx='18' ry='10' fill='%23334155'/></g><g class='penguin' transform='translate(260,100)'><ellipse cx='110' cy='130' rx='75' ry='105' fill='%23e2e8f0'/><ellipse cx='105' cy='115' rx='50' ry='70' fill='%23fff'/><path d='M70,95 Q55,60 100,50 Q145,60 130,95 Q145,130 100,135 Q55,130 70,95 Z' fill='%23334155'/><ellipse cx='88' cy='85' rx='18' ry='22' fill='%23fff'/><ellipse cx='122' cy='85' rx='18' ry='22' fill='%23fff'/><circle cx='92' cy='88' r='5' fill='%23000'/><circle cx='118' cy='88' r='5' fill='%23000'/><ellipse cx='105' cy='102' rx='12' ry='7' fill='%23bfdbfe' opacity='0.5'/><path d='M75,120 Q50,140 30,170 Q45,210 70,170 Z' fill='%23e2e8f0'/><path d='M135,120 Q160,110 185,80 Q195,110 145,160 Z' fill='%23e2e8f0'/><ellipse cx='65' cy='235' rx='18' ry='10' fill='%23334155'/><ellipse cx='135' cy='235' rx='18' ry='10' fill='%23334155'/></g><path d='M60,320 Q220,335 440,320' stroke='%23bfdbfe' stroke-width='12' fill='none' stroke-linecap='round'/></g></svg>'" alt="Tres Pingüinitos">

        <div class="form-group">
            <label for="productValue">Valor del producto (USD):</label>
            <input type="number" id="numberValue" placeholder="0.00" min="0" step="0.01">
        </div>
        <button id="btnCalculate" onclick="calcularPrecio()">Calcular Precio</button>
            <script>
        const CONFIG = {
            VALOR_DOLAR: 1550,
            RECARGO_FIJO: 2015
        };

        function calcularPrecio() {
            const inputVal = document.getElementById('numberValue').value;
            if (inputVal === '' || inputVal < 0) {
                alert('Por favor, ingresa un valor válido.');
                return;
            }
            const productValue = parseFloat(inputVal);
            let finalPrice = (productValue * CONFIG.VALOR_DOLAR) + CONFIG.RECARGO_FIJO;
            finalPrice = Math.ceil(finalPrice);

            const formattedPrice = new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 0
            }).format(finalPrice);

            document.getElementById('finalPrice').innerText = formattedPrice;
            document.getElementById('resultBox').classList.add('active');
            document.getElementById('btnCalculate').style.display = 'none';
        }

        function restablecer() {
            document.getElementById('numberValue').value = '';
            document.getElementById('resultBox').classList.remove('active');
            document.getElementById('btnCalculate').style.display = 'block';
        }
                        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            const icons = ['❄️', '❅', '❆', '•'];
            snowflake.innerText = icons[Math.floor(Math.random() * icons.length)];
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 4 + 's';
            snowflake.style.fontSize = Math.random() * 12 + 8 + 'px';
            document.body.appendChild(snowflake);
            setTimeout(() => { snowflake.remove(); }, 7000);
        }

        setInterval(createSnowflake, 120);

        const penguinElement = document.getElementById('jumpingPenguin');
        const mainSnow = document.getElementById('mainSnow');
        
        setInterval(() => {
            const currentSnowHeight = mainSnow.offsetHeight;
            if (currentSnowHeight > 0) {
                penguinElement.style.bottom = (currentSnowHeight - 15) + 'px';
            }
        }, 100);
    </script>
</body>
</html>
